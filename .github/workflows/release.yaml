name: 'Release'
on:
  push:
    tags:
      - '**'
jobs:
  build-dmg:
    name: 'Build DMG'
    runs-on: 'macos-latest'
    permissions:
      contents: 'write'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v6'
        with:
          fetch-depth: 0
      
      - name: 'Build App'
        run: |
          xcodebuild archive \
            -project Wallhavend.xcodeproj \
            -scheme Wallhavend \
            -archivePath ./build/Wallhavend.xcarchive \
            -destination "platform=macOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: 'Export App'
        run: |
          mkdir -p ./build/export
          cp -R ./build/Wallhavend.xcarchive/Products/Applications/Wallhavend.app ./build/export/

      - name: 'Create DMG'
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Wallhavend" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 450 185 \
            "./build/Wallhavend.dmg" \
            "./build/export/Wallhavend.app"

      - name: 'Create ZIP for Sparkle'
        run: |
          cd ./build/export
          zip -r --symlinks ../Wallhavend.zip Wallhavend.app

      - name: 'Sign ZIP with Sparkle EdDSA key'
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          curl -L -o /tmp/Sparkle.tar.xz https://github.com/sparkle-project/Sparkle/releases/download/2.9.0/Sparkle-2.9.0.tar.xz
          tar -xf /tmp/Sparkle.tar.xz -C /tmp
          echo "$SPARKLE_PRIVATE_KEY" | /tmp/bin/sign_update ./build/Wallhavend.zip > ./build/Wallhavend.zip.sig

      - name: 'Generate appcast.xml'
        run: |
          TAG=${GITHUB_REF_NAME}
          ZIP_URL="https://github.com/Attacktive/Wallhavend/releases/download/${TAG}/Wallhavend.zip"
          ZIP_SIZE=$(stat -f%z ./build/Wallhavend.zip)
          ED_SIGNATURE=$(cat ./build/Wallhavend.zip.sig)
          VERSION=${TAG#v}

          cat > ./build/appcast.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Wallhavend</title>
              <item>
                <title>${VERSION}</title>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:minimumSystemVersion>12.0</sparkle:minimumSystemVersion>
                <pubDate>$(date -u +"%a, %d %b %Y %H:%M:%S +0000")</pubDate>
                <enclosure
                  url="${ZIP_URL}"
                  sparkle:edSignature="${ED_SIGNATURE}"
                  length="${ZIP_SIZE}"
                  type="application/octet-stream"
                />
              </item>
            </channel>
          </rss>
          EOF

      - name: 'Upload DMG, ZIP, and appcast.xml to Release'
        uses: 'softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b'
        with:
          files: |
            ./build/Wallhavend.dmg
            ./build/Wallhavend.zip
            ./build/appcast.xml
          generate_release_notes: true
